<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWF / Masjid Ibrahim — Financial Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --green: #0D1F3C;
    --green-mid: #1A3560;
    --cream: #F5EFE0;
    --cream-dark: #EAE0C8;
    --red: #8B2020;
    --text: #1A1A1A;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Playfair Display', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    background: var(--green);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }
  .header-logo {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.5);
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .header-text { text-align: center; position: relative; z-index: 1; }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 40px,
      rgba(201,168,76,0.06) 40px, rgba(201,168,76,0.06) 41px
    );
  }
  header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }
  .bismillah {
    font-family: var(--serif);
    color: var(--gold-light);
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 16px;
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2.4rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 1.1;
    position: relative;
  }
  header h1 span { color: var(--gold); }
  .subtitle {
    margin-top: 10px;
    color: rgba(245,239,224,0.6);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* LAYOUT */
  .container { max-width: 1400px; margin: 0 auto; padding: 0 48px; }

  /* EDIT MODE TOGGLE */
  .edit-toggle {
    display: flex; align-items: center; gap: 10px;
    background: var(--green);
    color: var(--cream);
    border: none; border-radius: 4px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 1px;
    cursor: pointer;
    margin: 30px auto 0;
    display: block;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .edit-toggle:hover { background: var(--green-mid); }
  .edit-toggle.active { background: var(--gold); color: var(--green); }

  /* SECTION HEADERS */
  .section-label {
    display: flex; align-items: center; gap: 16px;
    margin: 48px 0 24px;
  }
  .section-label h2 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 700;
  }
  .year-badge {
    background: var(--green);
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .year-badge.future { background: var(--gold); color: var(--green); }

  /* CARDS GRID */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

  .card {
    background: white;
    border-radius: 6px;
    padding: 32px 28px;
    border-left: 4px solid var(--gold);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    animation: fadeUp 0.4s ease both;
  }
  .card.negative { border-left-color: var(--red); }
  .card.future { border-left-color: var(--gold-light); background: #FFFDF7; }
  .card.total { border-left-color: var(--green); background: var(--green); color: var(--cream); }
  .card.total .card-label { color: rgba(245,239,224,0.7); }
  .card.total .card-amount { color: var(--gold-light); }

  .card-label {
    font-size: 1.2rem;
    letter-spacing: 0.3px;
    text-transform: none;
    color: #444;
    margin-bottom: 12px;
    font-weight: 500;
    line-height: 1.4;
    font-family: var(--mono);
  }
  .card-amount {
    font-family: var(--serif);
    font-size: 2.8rem;
    font-weight: 700;
    line-height: 1;
  }
  .card-amount.neg { color: var(--red); }
  .card-amount.pos { color: var(--green-mid); }
  .card-sub {
    font-size: 1rem;
    color: #777;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* EDITABLE INPUT */
  .editable {
    display: none;
    width: 100%;
    border: none;
    border-bottom: 2px solid var(--gold);
    background: transparent;
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 700;
    color: inherit;
    outline: none;
    padding: 0;
    margin-top: 4px;
  }
  .editable.neg { color: var(--red); }
  .editable.pos { color: var(--green-mid); }
  body.edit-mode .card-amount { display: none; }
  body.edit-mode .editable { display: block; }

  /* WATERFALL */
  .waterfall {
    background: white;
    border-radius: 6px;
    padding: 36px;
    margin: 24px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .waterfall h3 {
    font-family: var(--serif);
    font-size: 1.5rem;
    margin-bottom: 24px;
    color: var(--green);
  }
  .wf-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0;
    border-bottom: 1px dashed var(--cream-dark);
    font-size: 1rem;
  }
  .wf-row:last-child { border-bottom: none; font-weight: 500; }
  .wf-label { color: #444; font-size: 1.15rem; }
  .wf-amount { font-family: var(--mono); font-weight: 600; font-size: 1.2rem; }
  .wf-amount.neg { color: var(--red); }
  .wf-amount.pos { color: var(--green-mid); }
  .wf-bar {
    height: 4px;
    border-radius: 2px;
    margin-top: 4px;
    background: var(--cream-dark);
    overflow: hidden;
  }
  .wf-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  /* SUMMARY BAR */
  /* NOTES */
  .notes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; margin: 24px 0; }
  .note-card {
    background: white; border-radius: 6px; padding: 24px 26px;
    border-top: 3px solid var(--gold);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    font-size: 1.05rem; line-height: 1.75; color: #333;
  }
  .note-card strong { display: block; font-size: 0.95rem; letter-spacing: 0.5px; text-transform: none; color: var(--green); margin-bottom: 8px; font-weight: 700; }

  /* DUA */
  .dua {
    text-align: center;
    margin: 48px 0 0;
    padding: 44px;
    background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
    border-radius: 8px;
    color: var(--cream);
  }
  .dua p { font-family: var(--serif); font-size: 1.35rem; font-style: italic; line-height: 1.8; }
  .dua .ameen { color: var(--gold-light); font-size: 1.7rem; margin-top: 12px; display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: 36px 20px 28px; }
    .container { padding: 0 14px; }
    .card-amount { font-size: 1.6rem; }
    .editable { font-size: 1.6rem; }
  }
</style>
</head>
